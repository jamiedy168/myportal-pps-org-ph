# Increase timeouts for long-running operations such as database backup/restore.
# pg_dump on a large RDS database can take several minutes.
#
# IMPORTANT: The AWS ALB idle timeout (default 60s) must ALSO be increased
# manually in the AWS Console:
#   EC2 → Load Balancers → [your ALB] → Attributes → Idle timeout → 300
# This file only controls the Nginx ↔ PHP-FPM side of the connection.

fastcgi_read_timeout    300;
fastcgi_send_timeout    300;
fastcgi_connect_timeout 10;

proxy_read_timeout      300;
proxy_send_timeout      300;
proxy_connect_timeout   10;
